name: Sync to GitLab
# 🤖 beep boop, claude was here

on:
  push:
    branches: ["**"]
    tags: ["**"]
  delete:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to GitLab
        run: |
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.com/${GITLAB_REPO}.git"
          git push gitlab --prune "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
          GITLAB_REPO: ${{ vars.GITLAB_REPO }}
          GIT_TERMINAL_PROMPT: 0
